<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maintenance - KitStore</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input, select, textarea { font-size: 14px !important; }
        .log-card { min-height: 60px; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-4">
            <a href="/" class="text-blue-400 font-bold tracking-widest text-xs">← BACK</a>
            <h2 class="text-2xl font-black text-red-500 uppercase">Maintenance</h2>
        </div>
        
        <div class="bg-gray-800 p-4 rounded-xl space-y-4 border border-gray-700 mb-8 shadow-lg">
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Item Name</label>
                    <select id="issue-item-name" class="w-full p-3 bg-gray-900 rounded-lg border border-gray-600 outline-none" onchange="updateBarcodes()"></select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Barcode</label>
                    <select id="issue-barcode" class="w-full p-3 bg-gray-900 rounded-lg border border-gray-600 outline-none"></select>
                </div>
            </div>
            <div class="flex gap-3">
                <button onclick="setType('Broken')" id="btn-broken" class="flex-1 py-3 rounded-lg border-2 border-transparent bg-gray-700 font-bold text-xs">BROKEN</button>
                <button onclick="setType('Missing')" id="btn-missing" class="flex-1 py-3 rounded-lg border-2 border-transparent bg-gray-700 font-bold text-xs">MISSING</button>
            </div>
            <div><textarea id="issue-notes" class="w-full p-3 bg-gray-900 rounded-lg border border-gray-600 outline-none h-16 text-sm" placeholder="Short notes..."></textarea></div>
            <button onclick="submitIssue()" class="w-full bg-red-600 hover:bg-red-500 py-3 rounded-xl text-lg font-black transition-all">LOG ISSUE</button>
        </div>

        <div class="mb-6">
            <input type="text" id="issue-search" placeholder="Search logs..." onkeyup="filterIssues()" 
                class="w-full p-3 bg-gray-800 border border-gray-700 rounded-xl outline-none focus:border-blue-500 text-sm">
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <h3 class="text-[10px] font-black text-yellow-500 uppercase mb-2 border-b border-yellow-900 pb-1">Broken Items</h3>
                <div id="broken-list" class="space-y-2"></div>
            </div>
            <div>
                <h3 class="text-[10px] font-black text-red-500 uppercase mb-2 border-b border-red-900 pb-1">Missing Items</h3>
                <div id="missing-list" class="space-y-2"></div>
            </div>
        </div>
    </div>

    <script>
        let allAssets = [];
        let selectedType = '';
        let currentIssues = [];

        window.onload = async () => {
            const assetRes = await fetch('/api/assets');
            const assetData = await assetRes.json();
            
            // FILTER: Exclude anything where Class contains "Kit" or "Header"
            allAssets = assetData.assets.filter(a => {
                const itemClass = (a.Class || a.class || "").toLowerCase();
                const isKit = itemClass.includes('kit');
                const isHeader = itemClass.includes('header');
                const hasCategory = a.Category || a.category;
                
                return !isKit && !isHeader && hasCategory;
            });
            
            const uniqueNames = [...new Set(allAssets.map(a => a['Asset Name'] || a.name))].filter(n => n).sort();
            const select = document.getElementById('issue-item-name');
            select.innerHTML = `<option value="">Select Item...</option>`;
            uniqueNames.forEach(n => {
                let opt = document.createElement('option');
                opt.value = n;
                opt.textContent = n;
                select.appendChild(opt);
            });
            
            loadIssues();
        };

        function updateBarcodes() {
            const name = document.getElementById('issue-item-name').value;
            const barcodes = allAssets.filter(a => (a['Asset Name'] || a.name) === name)
                                      .map(a => a.Barcodes || a.barcode)
                                      .filter(b => b);
            const bcSelect = document.getElementById('issue-barcode');
            bcSelect.innerHTML = `<option value="NONE">General / No BC</option>`;
            barcodes.forEach(b => {
                let opt = document.createElement('option');
                opt.value = b;
                opt.textContent = b;
                bcSelect.appendChild(opt);
            });
        }

        function setType(t) {
            selectedType = t;
            document.getElementById('btn-broken').className = `flex-1 py-3 rounded-lg border-2 font-bold text-xs ${t==='Broken'?'border-yellow-500 bg-yellow-900/20 text-yellow-500':'border-transparent bg-gray-700'}`;
            document.getElementById('btn-missing').className = `flex-1 py-3 rounded-lg border-2 font-bold text-xs ${t==='Missing'?'border-red-500 bg-red-900/20 text-red-500':'border-transparent bg-gray-700'}`;
        }

        async function submitIssue() {
            const item = document.getElementById('issue-item-name').value;
            const barcode = document.getElementById('issue-barcode').value;
            const notes = document.getElementById('issue-notes').value;
            if(!item || !selectedType) return alert("Select item and type");
            
            await fetch('/api/log-issue', { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ item, barcode, type: selectedType, notes })
            });
            location.reload();
        }

        async function loadIssues() {
            const res = await fetch('/api/issues'); 
            currentIssues = await res.json();
            renderLists(currentIssues);
        }

        function renderLists(issues) {
            const brokenContainer = document.getElementById('broken-list');
            const missingContainer = document.getElementById('missing-list');
            brokenContainer.innerHTML = issues.filter(i => i.type === 'Broken').map(i => renderCard(i)).join('') || '<p class="text-gray-700 italic text-[10px]">None</p>';
            missingContainer.innerHTML = issues.filter(i => i.type === 'Missing').map(i => renderCard(i)).join('') || '<p class="text-gray-700 italic text-[10px]">None</p>';
        }

        function renderCard(i) {
            return `<div class="log-card p-2 rounded-lg border-l-2 flex justify-between items-start bg-gray-800/40 border-gray-700 hover:bg-gray-800 transition-all ${i.type === 'Broken' ? 'border-yellow-500' : 'border-red-600'}">
                <div class="overflow-hidden">
                    <p class="font-bold text-white text-[11px] leading-tight truncate">${i.item}</p>
                    <p class="text-[9px] text-gray-500 font-mono">${i.barcode && i.barcode !== 'NONE' ? i.barcode : 'NO BC'}</p>
                    <p class="text-[9px] text-gray-400 mt-1 line-clamp-2">${i.notes || ''}</p>
                </div>
                <button onclick="deleteIssue('${i._id}')" class="text-gray-600 hover:text-red-500 font-bold pl-1 text-xs">✕</button>
            </div>`;
        }

        function filterIssues() {
            const query = document.getElementById('issue-search').value.toLowerCase();
            const filtered = currentIssues.filter(i => (i.item && i.item.toLowerCase().includes(query)) || (i.barcode && i.barcode.toLowerCase().includes(query)));
            renderLists(filtered);
        }

        async function deleteIssue(id) {
            if(!confirm("Delete log?")) return;
            await fetch(`/api/issues/${id}`, { method: 'DELETE' });
            loadIssues();
        }
    </script>
</body>
</html>
