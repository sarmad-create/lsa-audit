<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Maintenance - KitStore</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 p-8">
    <div class="max-w-4xl mx-auto">
        <a href="/" class="mb-8 inline-block text-blue-400 font-bold tracking-widest">← BACK TO HOME</a>
        <h2 class="text-4xl font-black mb-8 text-red-500">Report Issue</h2>
        
        <div class="bg-gray-800 p-6 rounded-2xl space-y-6 border border-gray-700 mb-8">
            <div class="grid grid-cols-2 gap-4">
                <div><label class="block text-xs font-bold text-gray-400 uppercase mb-2">Item Name</label><select id="issue-item-name" class="w-full p-4 bg-gray-900 rounded-xl border border-gray-600 outline-none" onchange="updateBarcodes()"></select></div>
                <div><label class="block text-xs font-bold text-gray-400 uppercase mb-2">Barcode</label><select id="issue-barcode" class="w-full p-4 bg-gray-900 rounded-xl border border-gray-600 outline-none"></select></div>
            </div>
            <div class="flex gap-4">
                <button id="btn-Broken" onclick="setType('Broken', this)" class="type-btn flex-1 py-4 rounded-xl border border-gray-600 font-bold transition-all">Broken</button>
                <button id="btn-Missing" onclick="setType('Missing', this)" class="type-btn flex-1 py-4 rounded-xl border border-gray-600 font-bold transition-all">Missing</button>
            </div>
            <textarea id="issue-notes" placeholder="Notes..." class="w-full p-4 bg-gray-900 rounded-xl border border-gray-600 h-20 outline-none"></textarea>
            <button onclick="submitIssue()" class="w-full bg-red-600 py-4 rounded-xl font-bold text-xl hover:bg-red-700 transition-all">Submit Report</button>
        </div>
        <div id="logged-issues-list" class="space-y-3"></div>
    </div>

    <script>
        let assets = []; let selectedType = "";
        
        window.onload = async () => { 
            const res = await fetch('/api/assets'); 
            const data = await res.json(); 
            // Assets are inside data.assets
            assets = data.assets || []; 
            
            const dropdown = document.getElementById('issue-item-name');
            dropdown.innerHTML = '<option value="">-- Select Asset --</option>';
            [...new Set(assets.map(a => a.name))].sort().forEach(n => {
                dropdown.innerHTML += `<option value="${n}">${n}</option>`;
            });
            loadIssues();
        };

        function updateBarcodes() {
            const name = document.getElementById('issue-item-name').value;
            const bcDropdown = document.getElementById('issue-barcode');
            bcDropdown.innerHTML = '<option value="NONE">No Barcode</option>';
            assets.filter(a => a.name === name && a.barcode).forEach(a => {
                bcDropdown.innerHTML += `<option value="${a.barcode}">${a.barcode}</option>`;
            });
        }

        function setType(t, btn) { 
            selectedType = t; 
            document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('bg-yellow-600','bg-red-600','text-white'));
            btn.classList.add(t === 'Broken' ? 'bg-yellow-600' : 'bg-red-600', 'text-white');
        }

        async function submitIssue() {
            const item = document.getElementById('issue-item-name').value;
            const barcode = document.getElementById('issue-barcode').value;
            const notes = document.getElementById('issue-notes').value;
            if(!item || !selectedType) return alert("Select item and type");
            
            await fetch('/api/log-issue', { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ item, barcode, type: selectedType, notes })
            });
            location.reload();
        }

        async function loadIssues() {
            const res = await fetch('/api/issues'); 
            const data = await res.json();
            document.getElementById('logged-issues-list').innerHTML = data.map(i => `
                <div class="p-4 rounded-xl border-l-4 flex justify-between items-center ${i.type === 'Broken' ? 'bg-yellow-900/20 border-yellow-500' : 'bg-red-900/20 border-red-600'}">
                    <div>
                        <p class="font-bold text-white">${i.item} <span class="text-xs text-gray-500">${i.barcode !== 'NONE' ? i.barcode : 'No Barcode'}</span></p>
                        <p class="text-xs text-gray-300">${i.type}: ${i.notes || 'No notes'}</p>
                        <p class="text-[9px] text-gray-500 uppercase mt-1">${i.timestamp || ''}</p>
                    </div>
                    <button onclick="deleteIssue('${i._id}')" class="text-red-500 font-bold px-2">✕</button>
                </div>`).join('');
        }

        async function deleteIssue(id) { 
            if(confirm("Delete this report?")) { 
                await fetch(`/api/issues/${id}`, { method: 'DELETE' }); 
                loadIssues(); 
            } 
        }
    </script>
</body>
</html>
