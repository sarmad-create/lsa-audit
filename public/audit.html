<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Audit Session - KitStore</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .audit-row-item { position: relative; background-color: #1e293b; border-radius: 12px; margin-bottom: 8px; overflow: hidden; border: 1px solid #334155; padding-left: 30px; transition: opacity 0.2s; }
        .audit-row-item::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 30px; background-color: var(--tab-color, #475569); }
        .row-complete { opacity: 0.6; background-color: #064e3b !important; --tab-color: #059669 !important; }
        .cat-Video { --tab-color: #a21caf; } .cat-Sound { --tab-color: #be123c; } .cat-Lighting { --tab-color: #a16207; } .cat-Grip { --tab-color: #1d4ed8; }
        .cat-Video-bg { background-color: #a21caf; color: white; } .cat-Sound-bg { background-color: #be123c; color: white; } .cat-Lighting-bg { background-color: #a16207; color: white; } .cat-Grip-bg { background-color: #1d4ed8; color: white; }
        .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .open .accordion-content { max-height: 5000px; }
        .error-flash { animation: shake 0.4s; border-color: #ef4444 !important; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        input#scanner { font-size: 16px !important; }
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans">
    <div class="sticky top-0 z-50 bg-gray-900 border-b border-gray-700 p-2 flex gap-2 items-center shadow-2xl">
        <div class="flex flex-col gap-1">
            <button onclick="saveAndExit('In Progress')" class="bg-gray-800 text-white px-2 py-1.5 rounded-lg font-bold text-[10px] border border-gray-600 uppercase">Pause</button>
            <button onclick="saveAndExit('Completed')" class="bg-green-900/40 text-green-400 px-2 py-1.5 rounded-lg font-bold text-[10px] border border-green-500 uppercase">Done</button>
        </div>
        <div class="flex-1 flex relative items-center">
            <input type="text" id="scanner" autofocus placeholder="SCAN..." class="w-full p-3 bg-blue-900/20 border-2 border-blue-500 rounded-xl text-lg font-mono outline-none pr-12" onkeypress="if(event.key==='Enter') handleScan(this.value)">
            <button onclick="handleScan(document.getElementById('scanner').value)" class="absolute right-1.5 p-2 bg-blue-600 rounded-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M13 7l5 5m0 0l-5 5m5-5H6" /></svg>
            </button>
        </div>
        <div class="text-right min-w-[60px]">
            <p id="total-progress" class="text-xl font-black text-blue-400 leading-none">0/0</p>
            <span class="text-[8px] text-gray-500 font-bold uppercase">Items</span>
        </div>
    </div>
    <div id="audit-list" class="p-3 max-w-5xl mx-auto space-y-2 pb-32"></div>

    <script>
        let activeItems = []; let openNames = new Set(); let manualOverride = false;
        let currentAuditId = null; let auditName = "";
        const CAT_ORDER = { "Video": 1, "Sound": 2, "Lighting": 3, "Grip": 4 };

        function esc(str) { return str ? str.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '&quot;') : ""; }
        function keepFocus() { const s = document.getElementById('scanner'); if (document.activeElement !== s) s.focus(); }

        window.onload = async () => {
            const p = new URLSearchParams(window.location.search);
            const resId = p.get('resume'); const newN = p.get('name');
            document.addEventListener('click', (e) => { if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'BUTTON' && !e.target.closest('button')) keepFocus(); });

            if (resId) {
                const res = await fetch('/api/history'); const hist = await res.json();
                const audit = hist.find(a => a.id == resId);
                if(audit) { activeItems = audit.items; currentAuditId = audit.id; auditName = audit.name; }
            } else if (newN) {
                const aRes = await fetch('/api/assets'); const aData = await aRes.json();
                const iRes = await fetch('/api/issues'); const issues = await iRes.json();
                const badB = new Set(issues.filter(i => i.barcode && i.barcode !== 'NONE').map(i => i.barcode));

                activeItems = aData.assets.filter(item => {
                    const isNotKit = item.assetType !== '1';
                    const hasCat = item.category && item.category !== "";
                    return !badB.has(item.barcode) && isNotKit && hasCat;
                }).map((item, idx) => ({ ...item, isAudited: false, uid: 'item-' + Date.now() + '-' + idx }));
                currentAuditId = Date.now().toString(); auditName = newN;
            } else { window.location.href = '/'; }
            render();
            keepFocus();
        };

        function handleScan(val) {
            const bc = val.trim().toUpperCase().replace(/^LSA/i, '');
            const inputEl = document.getElementById('scanner');
            if(!bc) return;
            if (activeItems.find(i => i.barcode && String(i.barcode).toUpperCase().replace(/^LSA/i,'') === bc && i.isCollected)) {
                alert("🛑 SISO: Item is OUT"); inputEl.value = ''; setTimeout(keepFocus, 50); return;
            }
            let found = false;
            activeItems.forEach(item => {
                if (String(item.barcode || "").toUpperCase().replace(/^LSA/i,'') === bc && !item.isAudited && !found) {
                    item.isAudited = true; found = true; manualOverride = false;
                }
            });
            if(!found) { inputEl.classList.add('error-flash'); setTimeout(() => inputEl.classList.remove('error-flash'), 400); }
            inputEl.value = ''; render(); setTimeout(keepFocus, 50);
        }

        function render() {
            const container = document.getElementById('audit-list'); container.innerHTML = '';
            const groups = {};
            activeItems.forEach(item => {
                if (!groups[item.name]) groups[item.name] = { name: item.name, category: item.category, total: 0, out: 0, audited: 0, barcodes: [] };
                groups[item.name].total++;
                if (item.isCollected) groups[item.name].out++;
                if (item.isAudited) groups[item.name].audited++;
                groups[item.name].barcodes.push(item);
            });
            let gArr = Object.values(groups).map(g => {
                const target = g.total - g.out;
                return { ...g, target, isDone: g.audited >= target && target >= 0 };
            }).sort((a,b) => (a.isDone - b.isDone) || (CAT_ORDER[a.category] - CAT_ORDER[b.category]));

            if (!manualOverride) { const nxt = gArr.find(g => !g.isDone); if(nxt) { openNames.clear(); openNames.add(nxt.name); } }

            let gAud = 0, gTarg = 0;
            gArr.forEach(g => {
                gAud += g.audited; gTarg += g.target;
                const isOpen = openNames.has(g.name); const catClass = `cat-${(g.category || 'General').replace(/\s/g, '')}`;
                const hasMan = g.barcodes.some(b => !b.barcode && !b.isCollected);
                const div = document.createElement('div');
                div.className = `audit-row-item ${g.isDone ? 'row-complete' : ''} ${isOpen ? 'open' : ''} ${catClass}`;
                div.innerHTML = `<div class="p-3 flex justify-between items-center cursor-pointer" onclick="toggleAccordion('${esc(g.name)}')">
                    <div class="flex-1"><div class="flex items-center gap-2"><p class="font-bold text-sm text-white">${g.name}</p>
                    <span class="text-[7px] px-1 py-0.5 rounded font-black uppercase ${catClass}-bg">${g.category}</span></div>
                    <span class="text-[8px] text-gray-500 uppercase font-black">Target: ${g.target}</span></div>
                    <div class="text-xl font-black">${g.audited}/${g.target}</div>
                </div>
                <div class="accordion-content bg-gray-900/80 px-2 pb-2 text-[10px] font-mono">
                    ${hasMan ? `<div class="flex items-center gap-2 mb-3 bg-gray-800 p-2 rounded-lg" onclick="event.stopPropagation()">
                        <input type="number" id="bulk-${esc(g.name)}" class="w-12 h-8 bg-gray-700 rounded text-center" value="${g.barcodes.filter(b=>!b.barcode && b.isAudited).length}">
                        <button onclick="bulkSet('${esc(g.name)}')" class="bg-blue-600 px-3 h-8 rounded font-black">SET</button>
                    </div>` : ''}
                    <div class="grid grid-cols-3 gap-2 pt-2 border-t border-gray-700">
                        <div><p class="text-green-500 font-bold text-[8px] text-center">Scanned</p>
                        <ul>${g.barcodes.filter(b=>b.isAudited).map(b=>`<li class="flex justify-between mb-1">✅ ${b.barcode||'No BC'} <button onclick="unscan('${b.uid}')" class="text-red-500">✕</button></li>`).join('')||'None'}</ul></div>
                        <div><p class="text-gray-500 font-bold text-[8px] text-center">In-Store</p>
                        <ul>${g.barcodes.filter(b=>!b.isCollected && !b.isAudited).map(b=>`<li class="flex justify-between mb-1">📦 ${b.barcode||'No BC'} ${!b.barcode ? `<button onclick="manualTick('${b.uid}')" class="bg-blue-600 px-1 rounded">TICK</button>` : ''}</li>`).join('')||'0'}</ul></div>
                        <div><p class="text-red-500 font-bold text-[8px] text-center">Out</p>
                        <ul>${g.barcodes.filter(b=>b.isCollected).map(b=>`<li class="text-gray-500">📡 ${b.barcode||'No BC'}</li>`).join('')||'0'}</ul></div>
                    </div>
                </div>`;
                container.appendChild(div);
            });
            document.getElementById('total-progress').innerText = `${gAud}/${gTarg}`;
        }

        function toggleAccordion(n) { manualOverride = true; if(openNames.has(n)) openNames.delete(n); else { openNames.clear(); openNames.add(n); } render(); setTimeout(keepFocus, 10); }
        function manualTick(uid) { const i = activeItems.find(x=>x.uid===uid); if(i){ i.isAudited=true; render(); setTimeout(keepFocus, 10); } }
        function unscan(uid) { const i = activeItems.find(x=>x.uid===uid); if(i){ i.isAudited=false; render(); setTimeout(keepFocus, 10); } }
        function bulkSet(name) {
            const count = parseInt(document.getElementById(`bulk-${name}`).value) || 0;
            let updated = 0; activeItems.forEach(i => { if(i.name === name && !i.barcode) i.isAudited = false; });
            activeItems.forEach(i => { if(i.name === name && !i.barcode && updated < count) { i.isAudited = true; updated++; } });
            render(); setTimeout(keepFocus, 10);
        }
        async function saveAndExit(s) { 
            await fetch('/api/save-audit', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ id: currentAuditId, name: auditName, items: activeItems, status: s }) }); 
            window.location.href = '/';
        }
    </script>
</body>
</html>
