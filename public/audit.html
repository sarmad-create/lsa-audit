<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Audit Session - KitStore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .audit-row-item { position: relative; background-color: #1e293b; border-radius: 12px; margin-bottom: 8px; overflow: hidden; border: 1px solid #334155; padding-left: 30px; transition: all 0.3s ease; }
        .audit-row-item::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 30px; background-color: var(--tab-color, #475569); }
        .row-complete { opacity: 0.6; background-color: #064e3b !important; --tab-color: #059669 !important; }
        .cat-Video { --tab-color: #a21caf; } .cat-Sound { --tab-color: #be123c; } .cat-Lighting { --tab-color: #a16207; } .cat-Grip { --tab-color: #1d4ed8; }
        .cat-Video-bg { background-color: #a21caf; color: white; } .cat-Sound-bg { background-color: #be123c; color: white; } .cat-Lighting-bg { background-color: #a16207; color: white; } .cat-Grip-bg { background-color: #1d4ed8; color: white; }
        .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .open .accordion-content { max-height: 2000px; }
        .qty-input { background: #0f172a; border: 1px solid #475569; color: white; width: 50px; border-radius: 4px; padding: 2px 4px; font-size: 12px; text-align: center; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <div class="sticky top-0 z-50 bg-gray-900 border-b border-gray-700 p-2 flex gap-2 items-center shadow-2xl">
        <button onclick="saveAndExit('In Progress')" class="bg-gray-800 text-white px-3 py-2 rounded-lg font-bold text-xs uppercase">Pause</button>
        <input type="text" id="scanner" autofocus placeholder="SCAN..." class="flex-1 p-3 bg-blue-900/20 border-2 border-blue-500 rounded-xl text-lg font-mono outline-none" onkeypress="if(event.key==='Enter') handleScan(this.value)">
        <div class="text-right px-2">
            <p id="total-progress" class="text-xl font-black text-blue-400">0/0</p>
        </div>
    </div>

    <div id="audit-list" class="p-3 max-w-5xl mx-auto space-y-2 pb-32"></div>

    <script>
        let activeItems = []; 
        let openNames = new Set(); 
        let currentAuditId = null; 
        let auditName = "";
        let isDirty = false;

        window.onload = async () => {
            const p = new URLSearchParams(window.location.search);
            const resId = p.get('resume'); 
            const newN = p.get('name');

            const [iRes, aRes] = await Promise.all([fetch('/api/issues'), fetch('/api/assets')]);
            const issues = await iRes.json();
            const masterData = await aRes.json();
            
            const badBarcodes = new Set(issues.map(i => i.barcode));

            if (resId) {
                const hRes = await fetch('/api/history'); 
                const hist = await hRes.json();
                const saved = hist.find(a => a.id == resId);
                activeItems = saved ? saved.items : [];
                currentAuditId = resId;
                auditName = saved ? saved.name : "";
            } else {
                activeItems = masterData.assets
                    .filter(a => !badBarcodes.has(a.barcode))
                    .map((a, idx) => ({
                        ...a,
                        barcode: a.barcode || 'NONE',
                        uid: 'item-' + idx + '-' + Date.now(),
                        isAudited: false
                    }));
                currentAuditId = Date.now().toString();
                auditName = newN;
            }
            render();
            setInterval(autosave, 5000);
        };

        function handleScan(val) {
            const bc = val.trim().toUpperCase().replace(/^LSA/i, '');
            let found = false;
            activeItems.forEach(item => {
                if (item.barcode.toUpperCase().replace(/^LSA/i, '') === bc && !item.isAudited && !item.isCollected && !found) {
                    item.isAudited = true; found = true; isDirty = true;
                }
            });
            document.getElementById('scanner').value = ''; 
            render();
        }

        function bulkUpdate(name, qty) {
            let count = 0;
            activeItems.forEach(item => {
                if (item.name === name && item.barcode === 'NONE' && !item.isCollected) {
                    item.isAudited = count < qty;
                    count++;
                }
            });
            isDirty = true; render();
        }

        function render() {
            const container = document.getElementById('audit-list');
            container.innerHTML = '';
            const groups = {};

            activeItems.forEach(item => {
                if (!groups[item.name]) groups[item.name] = { name: item.name, category: item.category, total: 0, audited: 0, items: [] };
                if (!item.isCollected) groups[item.name].total++;
                if (item.isAudited) groups[item.name].audited++;
                groups[item.name].items.push(item);
            });

            Object.values(groups).forEach(g => {
                const isOpen = openNames.has(g.name);
                const hasNoBC = g.items.some(i => i.barcode === 'NONE');
                
                const div = document.createElement('div');
                div.className = `audit-row-item ${g.audited >= g.total ? 'row-complete' : ''} ${isOpen ? 'open' : ''} cat-${g.category}`;
                div.innerHTML = `
                    <div class="p-3 flex justify-between items-center cursor-pointer" onclick="toggleAccordion('${g.name.replace(/'/g, "\\'")}')">
                        <div>
                            <p class="font-bold text-sm">${g.name}</p>
                            <span class="text-[8px] px-1 py-0.5 rounded cat-${g.category}-bg">${g.category}</span>
                        </div>
                        <div class="flex items-center gap-3">
                            ${hasNoBC ? `<input type="number" class="qty-input" value="${g.audited}" onclick="event.stopPropagation()" onchange="bulkUpdate('${g.name.replace(/'/g, "\\'")}', this.value)">` : ''}
                            <span class="font-black">${g.audited}/${g.total}</span>
                        </div>
                    </div>
                    <div class="accordion-content bg-gray-900/50 p-2">
                        ${g.items.map(i => `
                            <div class="flex justify-between text-[10px] py-1 border-b border-gray-700">
                                <span>${i.barcode === 'NONE' ? 'No Barcode' : i.barcode} ${i.isCollected ? ' (OUT)' : ''}</span>
                                ${!i.isCollected ? `<button onclick="toggleItem('${i.uid}')" class="${i.isAudited ? 'text-green-400' : 'text-gray-500'}">● ${i.isAudited ? 'AUDITED' : 'PENDING'}</button>` : ''}
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(div);
            });
            document.getElementById('total-progress').innerText = `${activeItems.filter(i=>i.isAudited).length}/${activeItems.filter(i=>!i.isCollected).length}`;
        }

        function toggleAccordion(n) { openNames.has(n) ? openNames.delete(n) : openNames.add(n); render(); }
        
        function toggleItem(uid) {
            const item = activeItems.find(i => i.uid === uid);
            if (item) { item.isAudited = !item.isAudited; isDirty = true; render(); }
        }

        async function autosave() {
            if (!isDirty) return;
            await fetch('/api/save-audit', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ id: currentAuditId, name: auditName, items: activeItems, status: 'In Progress' }) 
            });
            isDirty = false;
        }

        async function saveAndExit(status) {
            await autosave();
            window.location.href = '/history.html';
        }
    </script>
</body>
</html>
