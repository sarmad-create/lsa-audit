<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Audit | LSA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Prevents iOS zoom on input focus */
        input { font-size: 16px !important; }
        .scanning-active { border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2); }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans pb-20">

    <div class="sticky top-0 bg-gray-900/95 backdrop-blur-md z-50 p-4 border-b border-gray-800">
        <div class="flex items-center justify-between mb-4">
            <h2 id="audit-title" class="text-xl font-bold truncate mr-2">Audit Session</h2>
            <button onclick="finishAudit()" class="bg-green-600 px-4 py-2 rounded-xl font-bold text-sm">Finish</button>
        </div>

        <div class="relative flex items-center gap-2">
            <input type="text" id="scanner-input" 
                   placeholder="Scan barcode..." 
                   class="w-full bg-gray-800 border-2 border-gray-700 p-4 rounded-2xl outline-none transition-all focus:border-blue-500"
                   autocomplete="off">
            
            <button onclick="handleManualSubmit()" class="bg-blue-600 p-4 rounded-2xl hover:bg-blue-700 transition-all shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                </svg>
            </button>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-3 p-4">
        <div class="bg-gray-800 p-4 rounded-2xl border border-gray-700">
            <p class="text-xs font-bold text-gray-400 uppercase">Found</p>
            <p id="found-count" class="text-3xl font-black text-blue-500">0</p>
        </div>
        <div class="bg-gray-800 p-4 rounded-2xl border border-gray-700">
            <p class="text-xs font-bold text-gray-400 uppercase">SISO Out</p>
            <p id="out-count" class="text-3xl font-black text-orange-500">0</p>
        </div>
    </div>

    <div id="asset-list" class="px-4 space-y-3">
        </div>

    <script>
        let assets = [];
        const urlParams = new URLSearchParams(window.location.search);
        const sessionName = urlParams.get('name') || 'Unnamed Audit';
        const sessionId = Date.now().toString();

        document.getElementById('audit-title').innerText = sessionName;

        // --- MOBILE OPTIMIZATION: AUTO-FOCUS LOGIC ---
        const input = document.getElementById('scanner-input');

        // 1. Keep focus on the input box at all times
        document.addEventListener('click', () => {
            // Only refocus if user isn't clicking another button/input
            if (document.activeElement.tagName !== 'BUTTON' && document.activeElement.tagName !== 'INPUT') {
                input.focus();
            }
        });

        // 2. Handle Scanner "Enter" or Manual "Enter"
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                processScan(input.value);
            }
        });

        function handleManualSubmit() {
            processScan(input.value);
        }

        async function loadAssets() {
            try {
                const res = await fetch('/api/assets');
                const data = await res.json();
                assets = data.assets.map(a => ({ ...a, isAudited: false }));
                renderList();
            } catch (err) { alert("Error loading assets"); }
        }

        function processScan(val) {
            const code = val.trim().toUpperCase().replace(/^LSA/i, '');
            if (!code) return;

            const idx = assets.findIndex(a => a.barcode && a.barcode.toUpperCase().replace(/^LSA/i, '') === code);
            
            if (idx > -1) {
                assets[idx].isAudited = true;
                // Move item to top of visual list or play sound if needed
                renderList();
            } else {
                alert(`Barcode ${code} not found in master list.`);
            }

            input.value = '';
            input.focus();
        }

        function renderList() {
            const list = document.getElementById('asset-list');
            const foundCount = document.getElementById('found-count');
            const outCount = document.getElementById('out-count');
            
            list.innerHTML = '';
            let found = 0;
            let out = 0;

            assets.forEach(asset => {
                if (asset.isAudited) found++;
                if (asset.isCollected) out++;

                const card = document.createElement('div');
                card.className = `p-4 rounded-2xl border-2 transition-all ${
                    asset.isAudited ? 'bg-blue-900/30 border-blue-500' : 'bg-gray-800 border-gray-700'
                }`;

                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-xs font-bold text-gray-500 uppercase">${asset.category}</p>
                            <p class="font-bold text-lg">${asset.name}</p>
                            <p class="text-sm font-mono text-gray-400">${asset.barcode || 'NO BARCODE'}</p>
                        </div>
                        <div class="flex flex-col items-end gap-2">
                            ${asset.isAudited ? ' <span class="bg-blue-500 text-[10px] font-bold px-2 py-1 rounded-md uppercase">Found</span>' : ''}
                            ${asset.isCollected ? '<span class="bg-orange-600 text-[10px] font-bold px-2 py-1 rounded-md uppercase">🛑 SISO: OUT</span>' : ''}
                        </div>
                    </div>
                `;
                list.appendChild(card);
            });

            foundCount.innerText = found;
            outCount.innerText = out;
        }

        async function finishAudit() {
            const status = assets.every(a => a.isAudited || a.isCollected) ? 'Complete' : 'Incomplete';
            const body = { id: sessionId, name: sessionName, items: assets, status: status };
            
            await fetch('/api/save-audit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            window.location.href = '/history';
        }

        window.onload = () => {
            loadAssets();
            input.focus();
        };
    </script>
</body>
</html>
