<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Audit Session - KitStore</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .audit-row-item { position: relative; background-color: #1e293b; border-radius: 12px; margin-bottom: 8px; overflow: hidden; border: 1px solid #334155; padding-left: 30px; transition: all 0.3s ease; }
        .audit-row-item::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 30px; background-color: var(--tab-color, #475569); }
        .row-complete { opacity: 0.6; background-color: #064e3b !important; --tab-color: #059669 !important; }
        .cat-Video { --tab-color: #a21caf; } .cat-Sound { --tab-color: #be123c; } .cat-Lighting { --tab-color: #a16207; } .cat-Grip { --tab-color: #1d4ed8; }
        .cat-Video-bg { background-color: #a21caf; color: white; } .cat-Sound-bg { background-color: #be123c; color: white; } .cat-Lighting-bg { background-color: #a16207; color: white; } .cat-Grip-bg { background-color: #1d4ed8; color: white; }
        .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .open .accordion-content { max-height: 5000px; }
        .error-flash { animation: shake 0.4s; border-color: #ef4444 !important; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        #autosave-indicator { transition: opacity 0.5s; opacity: 0; }
        .qty-input { background: #0f172a; border: 1px solid #475569; color: white; width: 50px; border-radius: 4px; padding: 2px 4px; font-size: 11px; outline: none; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <div class="sticky top-0 z-50 bg-gray-900 border-b border-gray-700 p-2 flex gap-2 items-center shadow-2xl">
        <div class="flex flex-col gap-1">
            <button onclick="saveAndExit('In Progress')" class="bg-gray-800 text-white px-2 py-1.5 rounded-lg font-bold text-[10px] border border-gray-600 uppercase">Pause</button>
            <button onclick="saveAndExit('Completed')" class="bg-green-900/40 text-green-400 px-2 py-1.5 rounded-lg font-bold text-[10px] border border-green-500 uppercase">Done</button>
        </div>
        <div class="flex-1 flex relative items-center">
            <input type="text" id="scanner" autofocus placeholder="SCAN..." class="w-full p-3 bg-blue-900/20 border-2 border-blue-500 rounded-xl text-lg font-mono outline-none" onkeypress="if(event.key==='Enter') handleScan(this.value)">
        </div>
        <div class="text-right min-w-[75px]">
            <div id="autosave-indicator" class="text-[7px] text-green-400 font-bold uppercase mb-0.5">Autosaved</div>
            <p id="total-progress" class="text-xl font-black text-blue-400 leading-none">0/0</p>
            <span class="text-[8px] text-gray-500 font-bold uppercase">Items</span>
        </div>
    </div>
    <div id="audit-list" class="p-3 max-w-5xl mx-auto space-y-2 pb-32"></div>

    <script>
        let activeItems = []; 
        let openNames = new Set(); 
        let lastScannedName = ""; 
        let currentAuditId = null; 
        let auditName = "";
        let isDirty = false;
        const CAT_ORDER = { "Video": 1, "Sound": 2, "Lighting": 3, "Grip": 4 };

        function esc(str) { return str ? str.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '&quot;') : ""; }

        function keepFocus() { const s = document.getElementById('scanner'); if (document.activeElement !== s) s.focus(); }

        window.onload = async () => {
            const p = new URLSearchParams(window.location.search);
            const resId = p.get('resume'); 
            const newN = p.get('name');
            document.addEventListener('click', (e) => { if (e.target.tagName !== 'INPUT') keepFocus(); });

            const [iRes, aRes] = await Promise.all([fetch('/api/issues'), fetch('/api/assets')]);
            const issues = await iRes.json();
            const masterAssetData = await aRes.json();
            
            const badBarcodes = new Set(issues.filter(i => i.barcode && i.barcode !== 'NONE').map(i => i.barcode));

            let tempInventory = masterAssetData.assets.filter(item => {
                const bc = item.barcode || 'NONE';
                return !badBarcodes.has(bc);
            }).map((item, idx) => ({
                ...item,
                name: item.name || "Unknown Item",
                barcode: item.barcode || 'NONE',
                category: item.category || 'General',
                isAudited: false, 
                isCollected: item.isCollected || false,
                uid: 'item-' + idx + '-' + Date.now()
            }));

            if (resId) {
                const hRes = await fetch('/api/history'); 
                const hist = await hRes.json();
                const saved = hist.find(a => a.id == resId);
                if (saved) {
                    currentAuditId = saved.id; auditName = saved.name;
                    activeItems = saved.items;
                }
            } else {
                activeItems = tempInventory;
                currentAuditId = Date.now().toString(); 
                auditName = newN;
            }

            render();
            setInterval(autosave, 5000);
        };

        function handleScan(val) {
            const bc = val.trim().toUpperCase().replace(/^LSA/i, '');
            if(!bc) return;
            let found = false;
            activeItems.forEach(item => {
                if (item.barcode !== 'NONE' && String(item.barcode).toUpperCase().replace(/^LSA/i, '') === bc && !item.isAudited && !item.isCollected && !found) {
                    item.isAudited = true; found = true; isDirty = true;
                    lastScannedName = item.name; openNames.clear(); openNames.add(item.name);
                }
            });
            if(!found) { document.getElementById('scanner').classList.add('error-flash'); setTimeout(() => document.getElementById('scanner').classList.remove('error-flash'), 400); }
            document.getElementById('scanner').value = ''; render();
        }

        function handleBulkAudit(name, qty) {
            let count = 0;
            activeItems.forEach(item => {
                if (item.name === name && item.barcode === 'NONE' && !item.isCollected) {
                    item.isAudited = count < qty;
                    count++;
                }
            });
            isDirty = true; render();
        }

        function render() {
            const container = document.getElementById('audit-list'); container.innerHTML = '';
            const groups = {};
            activeItems.forEach(item => {
                if (!groups[item.name]) groups[item.name] = { name: item.name, category: item.category, total: 0, audited: 0, items: [], hasNoBC: false };
                if (!item.isCollected) groups[item.name].total++; 
                if (item.isAudited) groups[item.name].audited++;
                if (item.barcode === 'NONE') groups[item.name].hasNoBC = true;
                groups[item.name].items.push(item);
            });
            
            Object.values(groups).sort((a,b) => (CAT_ORDER[a.category] - CAT_ORDER[b.category]) || a.name.localeCompare(b.name)).forEach(g => {
                const isOpen = openNames.has(g.name);
                const div = document.createElement('div');
                div.className = `audit-row-item ${g.audited >= g.total ? 'row-complete' : ''} ${isOpen ? 'open' : ''} cat-${g.category.replace(/\s/g, '')}`;
                
                div.innerHTML = `<div class="p-3 flex justify-between items-center cursor-pointer" onclick="toggleAccordion('${esc(g.name)}')">
                    <div>
                        <p class="font-bold text-sm text-white">${g.name}</p>
                        <span class="text-[7px] px-1 py-0.5 rounded font-black uppercase cat-${g.category.replace(/\s/g, '')}-bg">${g.category}</span>
                    </div>
                    <div class="flex items-center gap-2">
                        ${g.hasNoBC ? `<input type="number" class="qty-input" value="${g.audited}" onclick="event.stopPropagation()" onchange="handleBulkAudit('${esc(g.name)}', this.value)">` : ''}
                        <div class="text-xl font-black">${g.audited}/${g.total}</div>
                    </div>
                </div>
                <div class="accordion-content bg-gray-900/80 px-2 pb-2">
                    ${g.items.map(i => `
                        <div class="flex justify-between items-center text-[10px] py-1 border-b border-gray-700">
                            <span class="${i.isCollected ? 'text-gray-500' : 'text-gray-300'}">${i.barcode === 'NONE' ? 'No Barcode' : i.barcode} ${i.isCollected ? '(OUT)' : ''}</span>
                            ${!i.isCollected ? `<button onclick="manualTick('${i.uid}')" class="${i.isAudited ? 'text-green-500' : 'text-blue-500'} font-bold">${i.isAudited ? '✅' : 'TICK'}</button>` : ''}
                        </div>
                    `).join('')}
                </div>`;
                container.appendChild(div);
            });
            document.getElementById('total-progress').innerText = `${activeItems.filter(i=>i.isAudited).length}/${activeItems.filter(i=>!i.isCollected).length}`;
        }

        function toggleAccordion(n) { openNames.has(n) ? openNames.delete(n) : (openNames.clear(), openNames.add(n)); render(); }
        function manualTick(uid) { const i = activeItems.find(x=>x.uid===uid); if(i){ i.isAudited = !i.isAudited; isDirty=true; render(); } }
        
        async function autosave() {
            if (!isDirty || !currentAuditId) return;
            await fetch('/api/save-audit', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ id: currentAuditId, name: auditName, items: activeItems, status: 'In Progress' }) });
            isDirty = false;
        }

        async function saveAndExit(s) { 
            await autosave();
            window.location.href = '/';
        }
    </script>
</body>
</html>
