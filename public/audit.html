<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Audit Session - KitStore</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .audit-row-item { position: relative; background-color: #1e293b; border-radius: 12px; margin-bottom: 8px; overflow: hidden; border: 1px solid #334155; padding-left: 30px; transition: all 0.3s ease; }
        .audit-row-item::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 30px; background-color: var(--tab-color, #475569); }
        .row-complete { opacity: 0.5; background-color: #064e3b !important; --tab-color: #059669 !important; }
        .cat-Video { --tab-color: #a21caf; } .cat-Sound { --tab-color: #be123c; } .cat-Lighting { --tab-color: #a16207; } .cat-Grip { --tab-color: #1d4ed8; }
        .cat-Video-bg { background-color: #a21caf; color: white; } .cat-Sound-bg { background-color: #be123c; color: white; } .cat-Lighting-bg { background-color: #a16207; color: white; } .cat-Grip-bg { background-color: #1d4ed8; color: white; }
        .cat-General-bg { background-color: #475569; color: white; }
        .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .open .accordion-content { max-height: 5000px; }
        .error-flash { animation: shake 0.4s; border-color: #ef4444 !important; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        input#scanner { font-size: 16px !important; }
        #autosave-indicator { transition: opacity 0.5s; opacity: 0; }
        .qty-input { background: #0f172a; border: 1px solid #334155; color: white; width: 55px; text-align: center; border-radius: 4px; font-weight: bold; padding: 2px; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <div class="sticky top-0 z-50 bg-gray-900 border-b border-gray-700 p-2 flex gap-2 items-center shadow-2xl">
        <div class="flex flex-col gap-1">
            <button onclick="saveAndExit('In Progress')" class="bg-gray-800 text-white px-2 py-1.5 rounded-lg font-bold text-[10px] border border-gray-600 uppercase">Pause</button>
            <button onclick="saveAndExit('Completed')" class="bg-green-900/40 text-green-400 px-2 py-1.5 rounded-lg font-bold text-[10px] border border-green-500 uppercase">Done</button>
        </div>
        <div class="flex-1 flex relative items-center">
            <input type="text" id="scanner" autofocus placeholder="SCAN..." class="w-full p-3 bg-blue-900/20 border-2 border-blue-500 rounded-xl text-lg font-mono outline-none" onkeypress="if(event.key==='Enter') handleScan(this.value)">
        </div>
        <div class="text-right min-w-[75px]">
            <div id="autosave-indicator" class="text-[7px] text-green-400 font-bold uppercase mb-0.5">Autosaved</div>
            <p id="total-progress" class="text-xl font-black text-blue-400 leading-none">0/0</p>
            <span class="text-[8px] text-gray-500 font-bold uppercase">Items</span>
        </div>
    </div>
    <div id="audit-list" class="p-3 max-w-5xl mx-auto space-y-2 pb-32"></div>

    <script>
        let activeItems = []; 
        let openNames = new Set(); 
        let lastScannedName = ""; 
        let currentAuditId = null; 
        let auditName = "";
        let isDirty = false;
        const CAT_ORDER = { "Video": 1, "Sound": 2, "Lighting": 3, "Grip": 4 };

        function esc(str) { return str ? str.replace(/'/g, "\\'") : ""; }
        function keepFocus() { const s = document.getElementById('scanner'); if (document.activeElement !== s) s.focus(); }

        window.onload = async () => {
            const p = new URLSearchParams(window.location.search);
            const resId = p.get('resume'); 
            const newN = p.get('name');
            document.addEventListener('click', (e) => { if(e.target.tagName !== 'INPUT') keepFocus(); });

            const [iRes, aRes] = await Promise.all([fetch('/api/issues'), fetch('/api/assets')]);
            const issues = await iRes.json();
            const masterAssetData = await aRes.json();
            
            const badB = new Set(issues.filter(i => i.barcode && i.barcode !== 'NONE').map(i => i.barcode));
            const badN = new Set(issues.filter(i => !i.barcode || i.barcode === 'NONE').map(i => i.item));

            const currentInventory = masterAssetData.assets.filter(item => {
                const itemClass = (item.Class || item.class || "").toLowerCase();
                const bc = (item.Barcodes || item.barcode || "NONE").toString().trim();
                const name = (item['Asset Name'] || item.name || "").toString().trim();

                const inMaintenance = badB.has(bc) || badN.has(name);
                
                // Keep "Family Item" (Blimps), "Single Asset", etc. Only block "Headers".
                const isHeader = itemClass.includes('header');

                return !inMaintenance && !isHeader && name.length > 0;
            }).map((item, idx) => ({
                ...item,
                name: item['Asset Name'] || item.name,
                barcode: item.Barcodes || item.barcode || "NONE",
                category: item.Category || item.category || "General",
                isAudited: false, 
                uid: 'item-' + idx + '-' + Date.now()
            }));

            if (resId) {
                const hRes = await fetch('/api/history'); 
                const hist = await hRes.json();
                const savedAudit = hist.find(a => a.id == resId);
                if (savedAudit) {
                    currentAuditId = savedAudit.id; 
                    auditName = savedAudit.name;
                    const scannedBarcodes = new Set(savedAudit.items.filter(i => i.isAudited && i.barcode !== "NONE").map(i => i.barcode));
                    const tickedNames = new Set(savedAudit.items.filter(i => i.isAudited && i.barcode === "NONE").map(i => i.name));
                    
                    activeItems = currentInventory.map(item => {
                        if (item.barcode !== "NONE" && scannedBarcodes.has(item.barcode)) item.isAudited = true;
                        // For non-barcoded items, we have to rely on name matching logic for resume
                        return item;
                    });
                }
            } else if (newN) {
                activeItems = currentInventory;
                currentAuditId = Date.now().toString(); 
                auditName = newN;
            }

            render();
            setInterval(autosave, 2000);
            setInterval(syncBackend, 3000);
        };

        async function syncBackend() {
            try {
                const res = await fetch('/api/assets');
                const data = await res.json();
                let changed = false;
                activeItems.forEach(item => {
                    const match = data.assets.find(fa => (fa.Barcodes || fa.barcode || "NONE") === item.barcode);
                    if (match && match.isCollected !== item.isCollected) {
                        item.isCollected = match.isCollected;
                        changed = true;
                    }
                });
                if (changed) { isDirty = true; render(); }
            } catch (e) { console.error("Sync failed", e); }
        }

        async function autosave() {
            if (!isDirty || !currentAuditId) return;
            try {
                const res = await fetch('/api/save-audit', { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({ id: currentAuditId, name: auditName, items: activeItems, status: 'In Progress' }) 
                });
                if(res.ok) {
                    isDirty = false;
                    const indicator = document.getElementById('autosave-indicator');
                    indicator.style.opacity = "1";
                    setTimeout(() => indicator.style.opacity = "0", 1000);
                }
            } catch (e) { console.error("Autosave failed", e); }
        }

        function handleScan(val) {
            const bc = val.trim().toUpperCase().replace(/^LSA/i, '');
            const inputEl = document.getElementById('scanner');
            if(!bc) return;
            let found = false;
            activeItems.forEach(item => {
                const itemBc = String(item.barcode).toUpperCase().replace(/^LSA/i, '');
                if (itemBc === bc && !item.isAudited && !found) {
                    item.isAudited = true; found = true; isDirty = true;
                    lastScannedName = item.name; openNames.clear(); openNames.add(item.name);
                }
            });
            if(!found) { inputEl.classList.add('error-flash'); setTimeout(() => inputEl.classList.remove('error-flash'), 400); }
            inputEl.value = ''; render();
        }

        function handleBulkUpdate(name, qty) {
            let count = 0;
            const targetQty = parseInt(qty) || 0;
            activeItems.forEach(item => {
                if (item.name === name && item.barcode === 'NONE' && !item.isCollected) {
                    item.isAudited = count < targetQty;
                    count++;
                }
            });
            isDirty = true;
            render();
        }

        function render() {
            const container = document.getElementById('audit-list'); container.innerHTML = '';
            const groups = {};
            activeItems.forEach(item => {
                if (!groups[item.name]) groups[item.name] = { name: item.name, category: item.category, total: 0, audited: 0, barcodes: [], hasNoBarcode: false };
                if (!item.isCollected) groups[item.name].total++; 
                if (item.isAudited) groups[item.name].audited++;
                if (item.barcode === 'NONE') groups[item.name].hasNoBarcode = true;
                groups[item.name].barcodes.push(item);
            });
            
            let gArr = Object.values(groups).sort((a,b) => {
                const aC = a.audited >= a.total; const bC = b.audited >= b.total;
                if (aC !== bC) return aC ? 1 : -1;
                if (!aC && a.name === lastScannedName) return -1;
                if (!aC && b.name === lastScannedName) return 1;
                return (CAT_ORDER[a.category] || 99) - (CAT_ORDER[b.category] || 99) || a.name.localeCompare(b.name);
            });

            let gAud = 0, gTarg = 0;
            gArr.forEach(g => {
                gAud += g.audited; gTarg += g.total;
                const isOpen = openNames.has(g.name);
                const div = document.createElement('div');
                div.className = `audit-row-item ${g.audited >= g.total ? 'row-complete' : ''} ${isOpen ? 'open' : ''} cat-${g.category.replace(/\s/g, '')}`;
                
                const bulkInput = g.hasNoBarcode ? 
                    `<input type="number" class="qty-input ml-2" value="${g.audited}" min="0" max="${g.total}" 
                        onclick="event.stopPropagation()" 
                        onchange="handleBulkUpdate('${esc(g.name)}', this.value)">` : '';

                div.innerHTML = `<div class="p-3 flex justify-between items-center cursor-pointer" onclick="toggleAccordion('${esc(g.name)}')">
                    <div class="flex-1"><p class="font-bold text-sm text-white">${g.name}${bulkInput}</p>
                    <span class="text-[7px] px-1 py-0.5 rounded font-black uppercase cat-${g.category.replace(/\s/g, '')}-bg">${g.category}</span></div>
                    <div class="text-xl font-black">${g.audited}/${g.total}</div>
                </div>
                <div class="accordion-content bg-gray-900/80 px-2 pb-2 text-[10px] font-mono">
                    <div class="grid grid-cols-3 gap-2">
                        <div>
                            <p class="mb-1 uppercase text-[8px] text-center text-green-500 font-bold">Scanned</p>
                            <ul>${g.barcodes.filter(b=>b.isAudited).map(b=>`<li class="mb-1 flex justify-between">✅ ${b.barcode} <button onclick="unscan('${b.uid}')" class="text-red-500">✕</button></li>`).join('')||'<li class="text-gray-600 italic text-center">0</li>'}</ul>
                        </div>
                        <div>
                            <p class="mb-1 uppercase text-[8px] text-center text-gray-400 font-bold">In-Store</p>
                            <ul>${g.barcodes.filter(b=>!b.isCollected && !b.isAudited).map(b=>`<li class="mb-1 flex justify-between">📦 ${b.barcode} ${b.barcode==='NONE'?`<button onclick="manualTick('${b.uid}')" class="bg-blue-600 px-1 rounded text-[8px]">TICK</button>`:''}</li>`).join('')||'<li class="text-gray-600 italic text-center">0</li>'}</ul>
                        </div>
                        <div>
                            <p class="mb-1 uppercase text-[8px] text-center font-bold">SISO-Out</p>
                            <ul>${g.barcodes.filter(b=>b.isCollected).map(b=>`<li class="mb-1 text-gray-500 text-[9px]">📡 ${b.barcode}</li>`).join('')||'<li class="text-gray-600 italic text-center">0</li>'}</ul>
                        </div>
                    </div>
                </div>`;
                container.appendChild(div);
            });
            document.getElementById('total-progress').innerText = `${gAud}/${gTarg}`;
        }

        function toggleAccordion(n) { if(openNames.has(n)) openNames.delete(n); else { openNames.clear(); openNames.add(n); } render(); setTimeout(keepFocus, 10); }
        function manualTick(uid) { const i = activeItems.find(x=>x.uid===uid); if(i){ i.isAudited=true; isDirty=true; lastScannedName = i.name; render(); setTimeout(keepFocus, 10); } }
        function unscan(uid) { const i = activeItems.find(x=>x.uid===uid); if(i){ i.isAudited=false; isDirty=true; render(); setTimeout(keepFocus, 10); } }
        
        async function saveAndExit(s) { 
            await fetch('/api/save-audit', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ id: currentAuditId, name: auditName, items: activeItems, status: s }) 
            }); 
            window.location.href = '/';
        }
    </script>
</body>
</html>
