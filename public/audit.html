<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Audit Session | LSA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .collected-row { opacity: 0.5; background-color: #1a202c; }
        .siso-out { border-left: 4px solid #ef4444; }
        /* Prevent zooming on mobile inputs */
        input { font-size: 16px !important; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans">
    <div class="max-w-4xl mx-auto p-4 pb-24">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 id="audit-title" class="text-2xl font-bold text-blue-500">New Audit</h1>
                <p id="audit-stats" class="text-sm text-gray-400">Loading assets...</p>
            </div>
            <button onclick="saveAndExit()" class="bg-gray-800 px-4 py-2 rounded-lg font-bold text-sm hover:bg-gray-700">Save & Exit</button>
        </div>

        <div class="sticky top-4 z-50 mb-8">
            <div class="relative flex items-center shadow-2xl">
                <input type="text" id="scanner-input" placeholder="Scan Barcode..." 
                    class="w-full bg-gray-800 border-2 border-blue-600 p-5 rounded-2xl text-xl outline-none focus:ring-4 focus:ring-blue-500/20 pr-16">
                
                <button onclick="handleManualSubmit()" class="absolute right-2 p-3 bg-blue-600 rounded-xl hover:bg-blue-500 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M13 7l5 5m0 0l-5 5m5-5H6" />
                    </svg>
                </button>
            </div>
        </div>

        <div id="audit-container" class="space-y-8">
            </div>
    </div>

    <div id="issue-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-[100]">
        <div class="bg-gray-800 w-full max-w-md p-6 rounded-3xl border-2 border-gray-700 shadow-2xl">
            <h2 id="modal-item-name" class="text-xl font-bold mb-1">Item Name</h2>
            <p id="modal-barcode" class="text-blue-400 text-sm mb-4 font-mono">Barcode</p>
            <div class="space-y-4">
                <button onclick="logIssue('Missing')" class="w-full bg-red-600 py-4 rounded-xl font-bold text-lg">Report Missing</button>
                <button onclick="logIssue('Broken')" class="w-full bg-orange-600 py-4 rounded-xl font-bold text-lg">Report Broken</button>
                <button onclick="closeModal()" class="w-full bg-gray-700 py-3 rounded-xl font-bold text-gray-300">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let allAssets = [];
        let auditData = { id: Date.now(), name: '', items: [], status: 'In Progress' };
        let currentIssueItem = null;

        const urlParams = new URLSearchParams(window.location.search);
        const sessionName = urlParams.get('name') || 'Unnamed Audit';
        const sessionId = urlParams.get('id');

        async function init() {
            document.getElementById('audit-title').innerText = sessionName;
            const res = await fetch('/api/assets');
            const data = await res.json();
            allAssets = data.assets;

            if (sessionId) {
                const histRes = await fetch('/api/history');
                const history = await histRes.json();
                const existing = history.find(a => a.id == sessionId);
                if (existing) auditData = existing;
            } else {
                auditData.name = sessionName;
                auditData.items = allAssets.map(a => ({ ...a, isAudited: false }));
            }
            render();
            
            // --- MOBILE SCANNER TWEAKS ---
            const input = document.getElementById('scanner-input');
            
            // 1. Keep focus on the input box automatically
            document.addEventListener('click', () => {
                if (document.activeElement.tagName !== 'INPUT' && !currentIssueItem) {
                    input.focus();
                }
            });

            // 2. Handle the "Enter" key sent by the scanner
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    processScan(input.value.trim());
                    input.value = '';
                }
            });
        }

        function handleManualSubmit() {
            const input = document.getElementById('scanner-input');
            processScan(input.value.trim());
            input.value = '';
            input.focus();
        }

        function processScan(barcode) {
            if (!barcode) return;
            const cleanBarcode = barcode.toUpperCase().replace(/^LSA/i, '');
            const item = auditData.items.find(i => i.barcode && i.barcode.toUpperCase().replace(/^LSA/i, '') === cleanBarcode);

            if (item) {
                if (item.isCollected) {
                    alert(`🛑 SISO ERROR: ${item.name} is currently marked as OUT in SISO.`);
                }
                item.isAudited = true;
                render();
                window.scrollTo({ top: document.getElementById(`item-${item.barcode}`).offsetTop - 150, behavior: 'smooth' });
            } else {
                alert("Barcode not found in this audit list.");
            }
        }

        function render() {
            const container = document.getElementById('audit-container');
            container.innerHTML = '';
            const categories = ['Video', 'Sound', 'Lighting', 'Grip'];
            
            let auditedCount = auditData.items.filter(i => i.isAudited).length;
            document.getElementById('audit-stats').innerText = `${auditedCount} / ${auditData.items.length} items scanned`;

            categories.forEach(cat => {
                const items = auditData.items.filter(i => i.category === cat);
                if (items.length === 0) return;

                const section = document.createElement('div');
                section.innerHTML = `<h2 class="text-xs font-bold text-gray-500 uppercase tracking-[0.2em] mb-4">${cat}</h2>`;
                const list = document.createElement('div');
                list.className = 'space-y-2';

                items.forEach(item => {
                    const row = document.createElement('div');
                    row.id = `item-${item.barcode}`;
                    row.className = `bg-gray-800 p-4 rounded-2xl flex justify-between items-center transition-all ${item.isAudited ? 'collected-row' : ''} ${item.isCollected ? 'siso-out' : ''}`;
                    
                    row.innerHTML = `
                        <div>
                            <div class="font-bold ${item.isAudited ? 'text-green-400' : 'text-gray-100'}">${item.name}</div>
                            <div class="text-xs font-mono text-gray-500">${item.barcode || 'NO BARCODE'} ${item.isCollected ? '<span class="text-red-500 font-bold ml-2 underline">SISO: OUT</span>' : ''}</div>
                        </div>
                        <div class="flex gap-2">
                            ${!item.isAudited ? `<button onclick="openIssueModal('${item.barcode}')" class="p-2 text-gray-500 hover:text-red-500">⚠️</button>` : '<span class="text-green-500 font-bold">✓</span>'}
                        </div>
                    `;
                    row.onclick = () => { if(!item.isAudited) processScan(item.barcode); };
                    list.appendChild(row);
                });
                section.appendChild(list);
                container.appendChild(section);
            });
        }

        function openIssueModal(barcode) {
            currentIssueItem = auditData.items.find(i => i.barcode === barcode);
            document.getElementById('modal-item-name').innerText = currentIssueItem.name;
            document.getElementById('modal-barcode').innerText = barcode;
            document.getElementById('issue-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('issue-modal').classList.add('hidden');
            currentIssueItem = null;
        }

        async function logIssue(type) {
            await fetch('/api/log-issue', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    item: currentIssueItem.name,
                    barcode: currentIssueItem.barcode,
                    type: type,
                    notes: `Reported during audit: ${sessionName}`
                })
            });
            closeModal();
            alert("Issue logged in maintenance tab.");
        }

        async function saveAndExit() {
            auditData.status = (auditData.items.every(i => i.isAudited)) ? 'Completed' : 'In Progress';
            await fetch('/api/save-audit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(auditData)
            });
            window.location.href = '/history';
        }

        init();
    </script>
</body>
</html>
