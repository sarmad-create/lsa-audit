<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Audit Session - KitStore</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .audit-row-item { position: relative; background-color: #1e293b; border-radius: 12px; margin-bottom: 8px; overflow: hidden; border: 1px solid #334155; padding-left: 30px; transition: all 0.3s ease; }
        .audit-row-item::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 30px; background-color: var(--tab-color, #475569); }
        .row-complete { opacity: 0.6; background-color: #064e3b !important; --tab-color: #059669 !important; }
        .cat-Video { --tab-color: #a21caf; } .cat-Sound { --tab-color: #be123c; } .cat-Lighting { --tab-color: #a16207; } .cat-Grip { --tab-color: #1d4ed8; }
        .cat-Video-bg { background-color: #a21caf; color: white; } .cat-Sound-bg { background-color: #be123c; color: white; } .cat-Lighting-bg { background-color: #a16207; color: white; } .cat-Grip-bg { background-color: #1d4ed8; color: white; }
        .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .open .accordion-content { max-height: 5000px; }
        .error-flash { animation: shake 0.4s; border-color: #ef4444 !important; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        input#scanner { font-size: 16px !important; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <div class="sticky top-0 z-50 bg-gray-900 border-b border-gray-700 p-2 flex gap-2 items-center shadow-2xl">
        <div class="flex flex-col gap-1">
            <button onclick="saveAndExit('In Progress')" class="bg-gray-800 text-white px-2 py-1.5 rounded-lg font-bold text-[10px] border border-gray-600 uppercase">Pause</button>
            <button onclick="saveAndExit('Completed')" class="bg-green-900/40 text-green-400 px-2 py-1.5 rounded-lg font-bold text-[10px] border border-green-500 uppercase">Done</button>
        </div>
        <div class="flex-1 flex relative items-center">
            <input type="text" id="scanner" autofocus placeholder="SCAN..." class="w-full p-3 bg-blue-900/20 border-2 border-blue-500 rounded-xl text-lg font-mono outline-none" onkeypress="if(event.key==='Enter') handleScan(this.value)">
        </div>
        <div class="text-right min-w-[60px]">
            <p id="total-progress" class="text-xl font-black text-blue-400 leading-none">0/0</p>
            <span class="text-[8px] text-gray-500 font-bold uppercase">Items</span>
        </div>
    </div>
    <div id="audit-list" class="p-3 max-w-5xl mx-auto space-y-2 pb-32"></div>

    <script>
        let activeItems = []; 
        let openNames = new Set(); 
        let lastScannedName = ""; 
        let currentAuditId = null; 
        let auditName = "";
        const CAT_ORDER = { "Video": 1, "Sound": 2, "Lighting": 3, "Grip": 4 };

        function esc(str) { return str ? str.replace(/'/g, "\\'") : ""; }
        function keepFocus() { const s = document.getElementById('scanner'); if (document.activeElement !== s) s.focus(); }

        window.onload = async () => {
            const p = new URLSearchParams(window.location.search);
            const resId = p.get('resume'); const newN = p.get('name');
            document.addEventListener('click', () => keepFocus());

            // 1. Fetch latest external data (Issues and Assets)
            const [iRes, aRes] = await Promise.all([fetch('/api/issues'), fetch('/api/assets')]);
            const issues = await iRes.json();
            const masterAssetData = await aRes.json();
            
            const badB = new Set(issues.filter(i => i.barcode && i.barcode !== 'NONE').map(i => i.barcode));

            if (resId) {
                const hRes = await fetch('/api/history'); const hist = await hRes.json();
                const audit = hist.find(a => a.id == resId);
                
                if(audit) { 
                    currentAuditId = audit.id; 
                    auditName = audit.name;
                    
                    // Filter existing items against new issues
                    const existingItems = audit.items.filter(item => !badB.has(item.barcode || item.Barcodes));
                    const existingBarcodes = new Set(existingItems.map(i => i.barcode || i.Barcodes));

                    // Check master list for NEW items matching criteria that aren't in the saved audit
                    const newItemsFromMaster = masterAssetData.assets.filter(item => {
                        const bc = item.Barcodes || item.barcode;
                        const itemClass = (item.Class || item.class || "").toLowerCase();
                        return !existingBarcodes.has(bc) && !badB.has(bc) && 
                               !itemClass.includes('kit') && !itemClass.includes('header') && (item.Category || item.category);
                    }).map((item, idx) => ({ 
                        ...item, 
                        name: item['Asset Name'] || item.name,
                        barcode: item.Barcodes || item.barcode,
                        category: item.Category || item.category,
                        isAudited: false, 
                        uid: 'new-' + Date.now() + '-' + idx 
                    }));

                    activeItems = [...existingItems, ...newItemsFromMaster];
                }
            } else if (newN) {
                activeItems = masterAssetData.assets.filter(item => {
                    const itemClass = (item.Class || item.class || "").toLowerCase();
                    return !badB.has(item.Barcodes || item.barcode) && !itemClass.includes('kit') && !itemClass.includes('header') && (item.Category || item.category);
                }).map((item, idx) => ({ 
                    ...item, 
                    name: item['Asset Name'] || item.name,
                    barcode: item.Barcodes || item.barcode,
                    category: item.Category || item.category,
                    isAudited: false, 
                    uid: 'item-' + Date.now() + '-' + idx 
                }));
                currentAuditId = Date.now().toString(); auditName = newN;
            }
            render();
        };

        function handleScan(val) {
            const bc = val.trim().toUpperCase().replace(/^LSA/i, '');
            const inputEl = document.getElementById('scanner');
            if(!bc) return;
            let found = false;
            activeItems.forEach(item => {
                const itemBc = String(item.barcode || "").toUpperCase().replace(/^LSA/i, '');
                if (itemBc === bc && !item.isAudited && !found) {
                    item.isAudited = true; 
                    found = true; 
                    lastScannedName = item.name; 
                    openNames.clear(); 
                    openNames.add(item.name);
                }
            });
            if(!found) { 
                inputEl.classList.add('error-flash'); 
                setTimeout(() => inputEl.classList.remove('error-flash'), 400); 
            }
            inputEl.value = ''; render();
        }

        function render() {
            const container = document.getElementById('audit-list'); container.innerHTML = '';
            const groups = {};
            activeItems.forEach(item => {
                if (!groups[item.name]) groups[item.name] = { name: item.name, category: item.category, total: 0, audited: 0, barcodes: [] };
                if (!item.isCollected) groups[item.name].total++;
                if (item.isAudited) groups[item.name].audited++;
                groups[item.name].barcodes.push(item);
            });
            
            let gArr = Object.values(groups).sort((a,b) => {
                const aComplete = a.audited >= a.total;
                const bComplete = b.audited >= b.total;
                if (aComplete !== bComplete) return aComplete ? 1 : -1;
                if (!aComplete) {
                    if (a.name === lastScannedName) return -1;
                    if (b.name === lastScannedName) return 1;
                }
                return (CAT_ORDER[a.category] - CAT_ORDER[b.category]) || a.name.localeCompare(b.name);
            });

            let gAud = 0, gTarg = 0;
            gArr.forEach(g => {
                gAud += g.audited; gTarg += g.total;
                const isOpen = openNames.has(g.name);
                const div = document.createElement('div');
                div.className = `audit-row-item ${g.audited >= g.total ? 'row-complete' : ''} ${isOpen ? 'open' : ''} cat-${(g.category || 'General').replace(/\s/g, '')}`;
                div.innerHTML = `<div class="p-3 flex justify-between items-center cursor-pointer" onclick="toggleAccordion('${esc(g.name)}')">
                    <div class="flex-1"><p class="font-bold text-sm text-white">${g.name}</p>
                    <span class="text-[7px] px-1 py-0.5 rounded font-black uppercase cat-${(g.category || 'General').replace(/\s/g, '')}-bg">${g.category}</span></div>
                    <div class="text-xl font-black">${g.audited}/${g.total}</div>
                </div>
                <div class="accordion-content bg-gray-900/80 px-2 pb-2 text-[10px] font-mono">
                    <div class="grid grid-cols-3 gap-2">
                        <div>
                            <p class="mb-1 uppercase text-[8px] text-center text-green-500 font-bold">Scanned</p>
                            <ul>${g.barcodes.filter(b=>b.isAudited).map(b=>`<li class="mb-1 flex justify-between">✅ ${b.barcode||'No BC'} <button onclick="unscan('${b.uid}')" class="text-red-500">✕</button></li>`).join('')||'<li class="text-gray-600 italic text-center">0</li>'}</ul>
                        </div>
                        <div>
                            <p class="mb-1 uppercase text-[8px] text-center text-gray-400 font-bold">In-Store</p>
                            <ul>${g.barcodes.filter(b=>!b.isCollected && !b.isAudited).map(b=>`<li class="mb-1 flex justify-between">📦 ${b.barcode||'No BC'} ${!b.barcode?`<button onclick="manualTick('${b.uid}')" class="bg-blue-600 px-1 rounded text-[8px]">TICK</button>`:''}</li>`).join('')||'<li class="text-gray-600 italic text-center">0</li>'}</ul>
                        </div>
                        <div>
                            <p class="mb-1 uppercase text-[8px] text-center font-bold">SISO-Out</p>
                            <ul>${g.barcodes.filter(b=>b.isCollected).map(b=>`<li class="mb-1 text-gray-500 text-[9px]">📡 ${b.barcode||'No BC'}</li>`).join('')||'<li class="text-gray-600 italic text-center">0</li>'}</ul>
                        </div>
                    </div>
                </div>`;
                container.appendChild(div);
            });
            document.getElementById('total-progress').innerText = `${gAud}/${gTarg}`;
        }

        function toggleAccordion(n) { if(openNames.has(n)) openNames.delete(n); else { openNames.clear(); openNames.add(n); } render(); setTimeout(keepFocus, 10); }
        function manualTick(uid) { const i = activeItems.find(x=>x.uid===uid); if(i){ i.isAudited=true; lastScannedName = i.name; render(); setTimeout(keepFocus, 10); } }
        function unscan(uid) { const i = activeItems.find(x=>x.uid===uid); if(i){ i.isAudited=false; render(); setTimeout(keepFocus, 10); } }
        
        async function saveAndExit(s) { 
            await fetch('/api/save-audit', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ id: currentAuditId, name: auditName, items: activeItems, status: s }) 
            }); 
            window.location.href = '/';
        }
    </script>
</body>
</html>
